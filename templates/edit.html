{% extends "base.html" %}

{% block body %}

<form action="/create" method="POST">
    <h3>Edit flashcard</h3>
    Title: <input type="text" name="title"><br><br>
    Body <input type="text" name="body" size="40"><br><br>
    <input type="submit" value="Add flashcard">
</form>

{% if isSubmitted %}
    <p>You typed title: {{ title }}</p>
    <p>You typed body: {{ body }}</p>
{% endif %}

{% endblock %}
